# Cloudflare Tunnel Configuration
# Bu dosyayı ~/.cloudflared/config.yml konumuna kopyalayın

tunnel: edupage  # cloudflared tunnel create edupage komutu ile oluşturduğunuz tünel adı
credentials-file: /Users/ozgurk12/.cloudflared/<TUNNEL-ID>.json  # Otomatik oluşturulacak

# Ingress rules - sadece frontend
ingress:
  # Frontend Application
  - hostname: etkinlik.hautmedia.com
    service: http://localhost:3001
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      # WebSocket desteği için
      httpHostHeader: "etkinlik.hautmedia.com"

  # Catch-all rule (zorunlu)
  - service: http_status:404

# Tunnel ayarları
originRequest:
  connectTimeout: 30s
  tlsTimeout: 30s
  tcpKeepAlive: 30s
  noHappyEyeballs: false
  keepAliveConnections: 4
  keepAliveTimeout: 90s
  httpHostHeader: ""
  originServerName: ""
  caPool: ""
  noTLSVerify: false
  disableChunkedEncoding: false
  bastionMode: false
  proxyAddress: ""
  proxyPort: 0
  proxyType: ""

# Retry ve log ayarları
retries: 5
grace-period: 30s
loglevel: info  # debug, info, warn, error
transport-loglevel: warn